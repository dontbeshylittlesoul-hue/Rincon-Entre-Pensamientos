<style>
  body.rincon-gate-activo {
    overflow: hidden;
  }

  .rincon-sound-gate {
    position: fixed;
    inset: 0;
    z-index: 99999;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
    background:
      radial-gradient(circle at 50% 25%, rgba(220, 155, 75, 0.22), transparent 360px),
      linear-gradient(180deg, rgba(7, 5, 3, 0.97), rgba(18, 10, 5, 0.98));
    transition: opacity 0.7s ease, visibility 0.7s ease;
  }

  .rincon-sound-gate.rincon-oculto {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .rincon-sound-card {
    width: min(520px, 100%);
    text-align: center;
    padding: 34px 24px;
    border-radius: 28px;
    border: 1px solid rgba(230, 185, 110, 0.34);
    background:
      radial-gradient(circle at 50% 0%, rgba(255, 210, 130, 0.13), transparent 280px),
      rgba(28, 17, 9, 0.82);
    box-shadow:
      0 24px 80px rgba(0, 0, 0, 0.62),
      0 0 42px rgba(214, 147, 66, 0.14);
    backdrop-filter: blur(8px);
  }

  .rincon-sound-mini {
    margin: 0 0 10px;
    font-family: Georgia, serif;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(236, 196, 132, 0.72);
  }

  .rincon-sound-card h2 {
    margin: 0 0 14px;
    font-family: Georgia, serif;
    font-size: clamp(2rem, 7vw, 3.4rem);
    font-weight: 300;
    line-height: 1.05;
    color: #f3d49c;
  }

  .rincon-sound-card p {
    max-width: 390px;
    margin: 0 auto 24px;
    font-family: Georgia, serif;
    font-size: 1.05rem;
    line-height: 1.55;
    color: rgba(238, 222, 198, 0.78);
  }

  .rincon-sound-options {
    display: grid;
    gap: 11px;
  }

  .rincon-sound-options button,
  .rincon-ambiente-menu button,
  .rincon-ambiente-toggle {
    border-radius: 999px;
    border: 1px solid rgba(220, 175, 105, 0.38);
    background: rgba(255, 230, 180, 0.11);
    color: #f4dbac;
    font-family: Georgia, serif;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .rincon-sound-options button {
    width: 100%;
    min-height: 48px;
    padding: 12px 18px;
    font-size: 1.02rem;
  }

  .rincon-sound-options button:hover,
  .rincon-ambiente-menu button:hover,
  .rincon-ambiente-toggle:hover {
    transform: translateY(-2px);
    background: rgba(255, 226, 170, 0.18);
    border-color: rgba(240, 200, 130, 0.58);
  }

  .rincon-silencio {
    opacity: 0.72;
  }

  .rincon-ambiente-control {
    position: relative;
    display: inline-block;
    margin-left: 8px;
  }

  .rincon-ambiente-toggle {
    min-height: 44px;
    padding: 10px 18px;
    font-size: 0.95rem;
    box-shadow: 0 0 18px rgba(255, 190, 95, 0.08);
  }

  .rincon-ambiente-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    z-index: 50;
    width: 230px;
    padding: 10px;
    border-radius: 18px;
    border: 1px solid rgba(230, 185, 110, 0.28);
    background: rgba(18, 10, 5, 0.96);
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    display: none;
  }

  .rincon-ambiente-control.abierto .rincon-ambiente-menu {
    display: grid;
    gap: 8px;
  }

  .rincon-ambiente-menu button {
    width: 100%;
    padding: 10px 12px;
    font-size: 0.94rem;
    text-align: left;
  }

  .rincon-ambiente-menu button.activo {
    background: rgba(255, 218, 150, 0.23);
    border-color: rgba(245, 205, 135, 0.66);
  }

  @media (max-width: 620px) {
    .rincon-ambiente-control {
      display: block;
      width: 100%;
      margin: 10px auto 0;
    }

    .rincon-ambiente-toggle {
      width: 100%;
    }

    .rincon-ambiente-menu {
      left: 0;
      right: 0;
      width: 100%;
    }

    .rincon-sound-card {
      padding: 30px 18px;
      border-radius: 22px;
    }
  }
</style>

<script>
(function () {
  "use strict";

  function initRinconAmbientes() {
    const botonViejoLluvia = document.getElementById("ambienteToggle");

    const audioLluviaExistente =
      document.getElementById("audioAmbiente") || new Audio("./ambiente-lluvia.mp3");

    audioLluviaExistente.loop = true;

    const sonidoPuerta = new Audio("./sounds/puerta-rincon.mp3");
    const sonidoClick = new Audio("./sounds/click-pergamino.mp3");

    const ambientes = {
      lluvia: {
        label: "☂ Lluvia suave",
        boton: "☂ Ambiente: lluvia",
        audio: audioLluviaExistente,
        volume: 0.38
      },
      fuego: {
        label: "🔥 Fuego bajo",
        boton: "🔥 Ambiente: fuego",
        audio: new Audio("./sounds/fuego-suave.mp3"),
        volume: 0.20
      },
      bosque: {
        label: "🌙 Bosque noche",
        boton: "🌙 Ambiente: bosque",
        audio: new Audio("./sounds/bosque-noche.mp3"),
        volume: 0.18
      },
      selva: {
        label: "🌿 Selva noche",
        boton: "🌿 Ambiente: selva",
        audio: new Audio("./sounds/selva-noche.mp3"),
        volume: 0.18
      }
    };

    Object.keys(ambientes).forEach(function (key) {
      ambientes[key].audio.loop = true;
      ambientes[key].audio.volume = ambientes[key].volume;
    });

    sonidoPuerta.volume = 0.32;
    sonidoClick.volume = 0.16;

    let ambienteActivo = "silencio";

    function reproducirCorto(audio) {
      if (!audio) return;

      try {
        audio.currentTime = 0;
        audio.play().catch(function () {});
      } catch (error) {}
    }

    function pausarTodosLosAmbientes() {
      Object.keys(ambientes).forEach(function (key) {
        const audio = ambientes[key].audio;
        audio.pause();
        audio.currentTime = 0;
      });

      if (botonViejoLluvia) {
        botonViejoLluvia.classList.remove("activo");
      }

      if (typeof window.actualizarLluviaVisual === "function") {
        window.actualizarLluviaVisual();
      }
    }

    function registrarAmbiente(nombre) {
      if (typeof window.trackGAEvent === "function") {
        window.trackGAEvent("ambiente_cambio", {
          event_label: nombre
        });
      } else if (typeof window.gtag === "function") {
        window.gtag("event", "ambiente_cambio", {
          event_label: nombre
        });
      }
    }

    function actualizarBotones() {
      const toggle = document.getElementById("rinconAmbienteToggle");
      const opciones = document.querySelectorAll("[data-rincon-ambiente-opcion]");

      if (toggle) {
        if (ambienteActivo === "silencio") {
          toggle.textContent = "🔇 Ambiente apagado";
        } else {
          toggle.textContent = ambientes[ambienteActivo].boton;
        }
      }

      opciones.forEach(function (boton) {
        const valor = boton.getAttribute("data-rincon-ambiente-opcion");
        boton.classList.toggle("activo", valor === ambienteActivo);
      });
    }

    function activarAmbiente(nombre) {
      pausarTodosLosAmbientes();

      ambienteActivo = nombre;

      if (nombre !== "silencio" && ambientes[nombre]) {
        const elegido = ambientes[nombre];

        elegido.audio.play()
          .then(function () {
            if (nombre === "lluvia" && botonViejoLluvia) {
              botonViejoLluvia.classList.add("activo");
            }

            if (typeof window.actualizarLluviaVisual === "function") {
              window.actualizarLluviaVisual();
            }
          })
          .catch(function (error) {
            console.log("No se pudo reproducir el ambiente:", nombre, error);
          });
      }

      registrarAmbiente(nombre);
      actualizarBotones();
    }

    function cerrarEntrada() {
      const gate = document.getElementById("rinconSoundGate");
      if (!gate) return;

      gate.classList.add("rincon-oculto");
      document.body.classList.remove("rincon-gate-activo");

      try {
        sessionStorage.setItem("rinconSoundGateV1", "vista");
      } catch (error) {}
    }

    function crearEntradaSonora() {
      if (document.getElementById("rinconSoundGate")) return;

      const yaVista = (function () {
        try {
          return sessionStorage.getItem("rinconSoundGateV1") === "vista";
        } catch (error) {
          return false;
        }
      })();

      document.body.insertAdjacentHTML("afterbegin", `
        <div id="rinconSoundGate" class="rincon-sound-gate ${yaVista ? "rincon-oculto" : ""}" role="dialog" aria-modal="true">
          <div class="rincon-sound-card">
            <div class="rincon-sound-mini">Antes de entrar</div>
            <h2>Elegí cómo llega el Rincón hoy</h2>
            <p>Una pequeña pausa antes de leer. Activá un ambiente o entrá en silencio.</p>

            <div class="rincon-sound-options">
              <button type="button" data-rincon-start="lluvia">☂ Lluvia suave</button>
              <button type="button" data-rincon-start="fuego">🔥 Fuego bajo</button>
              <button type="button" data-rincon-start="bosque">🌙 Bosque noche</button>
              <button type="button" data-rincon-start="selva">🌿 Selva noche</button>
              <button type="button" data-rincon-start="silencio" class="rincon-silencio">Entrar en silencio</button>
            </div>
          </div>
        </div>
      `);

      if (!yaVista) {
        document.body.classList.add("rincon-gate-activo");
      }
    }

    function crearControlAmbiente() {
      if (document.getElementById("rinconAmbienteControl")) return;

      const htmlControl = `
        <div id="rinconAmbienteControl" class="rincon-ambiente-control">
          <button id="rinconAmbienteToggle" class="rincon-ambiente-toggle" type="button">
            🔇 Ambiente apagado
          </button>

          <div class="rincon-ambiente-menu" aria-label="Elegir ambiente">
            <button type="button" data-rincon-ambiente-opcion="lluvia">☂ Lluvia suave</button>
            <button type="button" data-rincon-ambiente-opcion="fuego">🔥 Fuego bajo</button>
            <button type="button" data-rincon-ambiente-opcion="bosque">🌙 Bosque noche</button>
            <button type="button" data-rincon-ambiente-opcion="selva">🌿 Selva noche</button>
            <button type="button" data-rincon-ambiente-opcion="silencio">🔇 Silencio</button>
          </div>
        </div>
      `;

      if (botonViejoLluvia && botonViejoLluvia.parentElement) {
        botonViejoLluvia.style.display = "none";
        botonViejoLluvia.insertAdjacentHTML("afterend", htmlControl);
      } else {
        document.body.insertAdjacentHTML("beforeend", htmlControl);
      }

      actualizarBotones();
    }

    crearEntradaSonora();
    crearControlAmbiente();

    document.addEventListener("click", function (event) {
      const startButton = event.target.closest("[data-rincon-start]");
      const ambienteButton = event.target.closest("[data-rincon-ambiente-opcion]");
      const toggleButton = event.target.closest("#rinconAmbienteToggle");
      const control = document.getElementById("rinconAmbienteControl");

      if (startButton) {
        const ambiente = startButton.getAttribute("data-rincon-start");
        reproducirCorto(sonidoPuerta);
        activarAmbiente(ambiente);
        cerrarEntrada();
        return;
      }

      if (toggleButton && control) {
        reproducirCorto(sonidoClick);
        control.classList.toggle("abierto");
        return;
      }

      if (ambienteButton && control) {
        const ambiente = ambienteButton.getAttribute("data-rincon-ambiente-opcion");
        reproducirCorto(sonidoClick);
        activarAmbiente(ambiente);
        control.classList.remove("abierto");
        return;
      }

      if (control && !event.target.closest("#rinconAmbienteControl")) {
        control.classList.remove("abierto");
      }
    });

    document.addEventListener("click", function (event) {
      const elemento = event.target.closest("a, button");

      if (!elemento) return;
      if (elemento.closest("#rinconSoundGate")) return;
      if (elemento.closest("#rinconAmbienteControl")) return;

      reproducirCorto(sonidoClick);
    }, true);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initRinconAmbientes);
  } else {
    initRinconAmbientes();
  }
})();
</script>
